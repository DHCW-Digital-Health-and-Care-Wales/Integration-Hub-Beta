# Dashboard Build Pipeline
trigger:
  branches:
    include:
      - main
      - release-*
  paths:
    include:
      - dashboard/*
      - pipeline-ado/templates/*

pr: none

parameters:
  - name: SEMANTIC_VERSION
    displayName: 'Semantic Version'
    type: string
    default: 'v0.1.0'

variables:
  acrName: 'uksdhcwihsharedcr'
  azureServiceConnection: 'DEV-MonitoringDashboard'
  POOL_NAME: 'UKS-DHCW-IH-DEV-ADOManagedPool'

stages:
  - stage: UpdateLockfile
    displayName: 'Update Lockfile'
    jobs:
      - job: RegenerateLock
        displayName: 'Regenerate uv.lock with patched dependencies'
        pool:
          ${{ if eq(variables.POOL_NAME, 'Azure Pipelines') }}:
            vmImage: 'ubuntu-latest'
          ${{ else }}:
            name: ${{ variables.POOL_NAME }}
        steps:
          - checkout: self
            persistCredentials: true
            fetchDepth: 1
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.13'
          - script: |
              set -euo pipefail
              python -m pip install uv
              cd dashboard
              uv lock --upgrade-package setuptools
              git config user.email "pipeline@dhcw.nhs.wales"
              git config user.name "Azure Pipeline"
              if ! git diff --quiet uv.lock; then
                git add uv.lock
                git commit -m "chore: upgrade setuptools in lockfile (PYSEC-2026-3447)"
                git push
              else
                echo "uv.lock already up to date, no commit needed"
              fi
            displayName: 'Upgrade setuptools in uv.lock'

  - stage: CodeQuality
    displayName: 'Code Quality & Tests'
    dependsOn: UpdateLockfile
    jobs:
      - template: templates/code-quality-template.yml
        parameters:
          appName: 'dashboard'
          appDisplayName: 'Dashboard'
          pythonVersion: '3.13'
          poolName: ${{ variables.POOL_NAME }}
          banditSourceDir: 'dashboard'
          usePytest: true

  - stage: BuildAndPushDashboard
    displayName: 'Build and Push Dashboard'
    dependsOn: CodeQuality
    jobs:
      - template: templates/docker-build-push-template.yml
        parameters:
          jobName: 'BuildPushDashboard'
          displayName: 'Build and Push Dashboard'
          appName: 'dashboard'
          dockerfilePath: 'dashboard/Dockerfile'
          buildContext: 'dashboard'
          acrName: $(acrName)
          azureServiceConnection: $(azureServiceConnection)
          POOL_NAME: ${{ variables.POOL_NAME }}
          SEMANTIC_VERSION: ${{ parameters.SEMANTIC_VERSION }}
