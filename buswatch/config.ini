# BusWatch environment configuration example
# Copy values into your own .env file as needed.

# Azure Service Bus connection string.
# Default shown here is the emulator-friendly value used in config.py.
SERVICEBUS_CONNECTION_STRING=Endpoint=sb://localhost;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true;

# Optional comma-separated queue names.
# Leave empty to use queue discovery from ServiceBusEmulatorConfig.json.
BUSWATCH_QUEUE_NAMES=

# Number of messages to peek per queue on the home page.
BUSWATCH_PEEK_COUNT=25

# Max messages to scan when looking up a specific sequence number.
BUSWATCH_DETAIL_SEARCH_LIMIT=250